<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Civic issue monitoring illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="60%" stop-color="#155e75"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>

  <circle cx="130" cy="120" r="110" fill="#f59e0b" opacity="0.25"/>
  <circle cx="1060" cy="120" r="140" fill="#22c55e" opacity="0.2"/>

  <rect x="100" y="210" width="130" height="260" rx="10" fill="#e2e8f0" opacity="0.88"/>
  <rect x="250" y="160" width="170" height="320" rx="10" fill="#f1f5f9" opacity="0.9"/>
  <rect x="450" y="200" width="140" height="280" rx="10" fill="#e2e8f0" opacity="0.85"/>
  <rect x="610" y="170" width="200" height="310" rx="10" fill="#f8fafc" opacity="0.9"/>
  <rect x="840" y="220" width="120" height="260" rx="10" fill="#e2e8f0" opacity="0.85"/>

  <g fill="#94a3b8" opacity="0.7">
    <rect x="125" y="245" width="20" height="20"/>
    <rect x="155" y="245" width="20" height="20"/>
    <rect x="185" y="245" width="20" height="20"/>
    <rect x="125" y="280" width="20" height="20"/>
    <rect x="155" y="280" width="20" height="20"/>
    <rect x="185" y="280" width="20" height="20"/>

    <rect x="280" y="200" width="24" height="24"/>
    <rect x="315" y="200" width="24" height="24"/>
    <rect x="350" y="200" width="24" height="24"/>
    <rect x="280" y="240" width="24" height="24"/>
    <rect x="315" y="240" width="24" height="24"/>
    <rect x="350" y="240" width="24" height="24"/>

    <rect x="640" y="210" width="28" height="28"/>
    <rect x="680" y="210" width="28" height="28"/>
    <rect x="720" y="210" width="28" height="28"/>
    <rect x="760" y="210" width="28" height="28"/>
    <rect x="640" y="252" width="28" height="28"/>
    <rect x="680" y="252" width="28" height="28"/>
    <rect x="720" y="252" width="28" height="28"/>
    <rect x="760" y="252" width="28" height="28"/>
  </g>

  <path d="M0 640 L1200 560 L1200 800 L0 800 Z" fill="url(#road)"/>
  <path d="M0 690 L1200 610" stroke="#f8fafc" stroke-width="8" stroke-dasharray="24 24" opacity="0.8"/>

  <g filter="url(#shadow)">
    <circle cx="350" cy="610" r="62" fill="#0f766e"/>
    <text x="350" y="602" fill="#ffffff" text-anchor="middle" font-size="18" font-family="Manrope, sans-serif" font-weight="700">WATER</text>
    <text x="350" y="627" fill="#ffffff" text-anchor="middle" font-size="14" font-family="Manrope, sans-serif">LOGGING</text>

    <circle cx="540" cy="580" r="62" fill="#dc2626"/>
    <text x="540" y="573" fill="#ffffff" text-anchor="middle" font-size="18" font-family="Manrope, sans-serif" font-weight="700">ROAD</text>
    <text x="540" y="598" fill="#ffffff" text-anchor="middle" font-size="14" font-family="Manrope, sans-serif">DEFECTS</text>

    <circle cx="730" cy="610" r="62" fill="#0e7490"/>
    <text x="730" y="602" fill="#ffffff" text-anchor="middle" font-size="18" font-family="Manrope, sans-serif" font-weight="700">LIGHT</text>
    <text x="730" y="627" fill="#ffffff" text-anchor="middle" font-size="14" font-family="Manrope, sans-serif">ISSUES</text>

    <circle cx="920" cy="580" r="62" fill="#16a34a"/>
    <text x="920" y="573" fill="#ffffff" text-anchor="middle" font-size="18" font-family="Manrope, sans-serif" font-weight="700">WASTE</text>
    <text x="920" y="598" fill="#ffffff" text-anchor="middle" font-size="14" font-family="Manrope, sans-serif">ALERTS</text>
